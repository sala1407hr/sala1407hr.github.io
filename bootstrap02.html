<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<title>Bootstrap!</title>
</head>
<body>
    <!-- Container fluido -->
    <div class="container-fluid">
        <h1>Minha primeira pagina</h1>    
        <p>Altere a resolução da tela!</p> 
    </div>
    <!-- Container normal com colunas -->
    <div class="container-fluid">
        <div class="row">
            <div class="col">
            <h3>Coluna 1</h3>
            <p>Texto para ilustrar</p>
            <p>mais detalhes adicionais!</p>
            </div>
            <div class="col">
            <h3>Coluna 2</h3>
            <p>Mais detalhes disponiveis</p>
            <p>muita informação a se adicionar!</p>
            </div>
            <div class="col">
            <h3>Coluna 3</h3>
            <p>Finalizando!</p>
            <p>agora deve-se fazer mais para praticar!</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
